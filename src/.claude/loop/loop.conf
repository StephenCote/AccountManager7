# loop.conf — AccountManager7 per-repo overrides (sourced by detect.sh).
#
# By default the gate targets whichever module(s) have uncommitted git changes.
# To pin the loop to one module for a session, either export before launching:
#     export LOOP_MODULE=AccountManagerUx752
# or uncomment here:
# LOOP_MODULE="AccountManagerUx752"
#
# Or gate a fixed set regardless of git state:
# MODULES="AccountManagerObjects7 AccountManagerService7"
#
# Detected defaults per module type:
#   Maven module  -> build: mvn -q -B -DskipTests test-compile ; test: mvn -q -B test
#   Ux752         -> build: npm run build ; test: npx vitest run ; e2e: npx playwright test
#   Ux7           -> build: npm run build ; test: npm run --if-present test
#
# To fully override commands for a specific module, redefine loop_cmds_for and
# dispatch on "$(basename "$1")". Example:
# loop_cmds_for() {
#   BUILD_CMD=""; TEST_CMD=""; LINT_CMD=""; E2E_CMD=""
#   case "$(basename "$1")" in
#     AccountManagerUx752)
#       BUILD_CMD="npx vite build"; TEST_CMD="npx vitest run"; E2E_CMD="npx playwright test" ;;
#     AccountManager*7|AccountManager*42001)
#       BUILD_CMD="mvn -q -B -DskipTests test-compile"; TEST_CMD="mvn -q -B test" ;;
#   esac
# }
