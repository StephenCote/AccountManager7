## Test configuration for AccountManagerService7
## ISO 42001 Phase-7 service test: reuse the adjacent ISO module's dedicated postgres DB (built by
## Phases 1-6). FILE_BASE is pointed at ../AccountManagerISO42001/am7 in the test so the /ISO42001 org
## keystores/streams (module-local there) resolve. NEVER drop/recreate the container; reset must stay false.
test.db.url=jdbc:postgresql://localhost:15430/am7isotestdb
test.db.user=am7user
test.db.password=password
test.db.reset=false
## Vector DB support master switch (decoupled from embedding-server health). Default true — a transient
## embedding-server outage does NOT disable vector support. vector.probe.embedding toggles the startup health
## probe (informational only; a failed probe warns but never disables vector support).
vector.enabled=true
vector.probe.embedding=true
## LLM (Ollama)
test.llm.type=ollama
test.llm.ollama.model=qwen3-coder:30b
test.llm.ollama.server=http://192.168.1.42:11434
## Stable Diffusion (Swarm)
test.swarm.server=http://192.168.1.42:7801
test.swarm.model=sdXL_v10VAEFix.safetensors
test.swarm.refinerModel=juggernautXL_ragnarokBy.safetensors
