worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream tomcat_backend {
    server 127.0.0.1:8444;
  }

  upstream ux752_backend {
    server 127.0.0.1:8899;
  }

  server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name _;

    # Same self-signed pair the entrypoint generates for Tomcat (see
    # entrypoint.sh) -- externally-facing TLS identity for the container.
    ssl_certificate     /etc/am7/certs/server.cert;
    ssl_certificate_key /etc/am7/certs/server.key;

    client_max_body_size 100m;

    # REST/MCP API + WebSocket -> Tomcat. proxy_ssl_verify is off because
    # nginx re-encrypts to Tomcat's own self-signed HTTPS connector on
    # 127.0.0.1:8444 (double-TLS passthrough, matching the current dev setup
    # where the Vite dev server proxies to https://localhost:8443 with
    # secure:false).
    location /AccountManagerService7/wss {
      proxy_pass https://tomcat_backend;
      proxy_ssl_verify off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    location /AccountManagerService7/ {
      proxy_pass https://tomcat_backend;
      proxy_ssl_verify off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ux752, served at runtime by `npx vite preview` (a node/npm process) per
    # explicit instruction -- nginx proxies to it rather than serving the
    # static `vite build` output itself. vite's basic-ssl plugin also applies
    # to the preview server, hence https:// + proxy_ssl_verify off here too.
    location / {
      proxy_pass https://ux752_backend;
      proxy_ssl_verify off;
      # Pin the upstream Host to localhost:8899 rather than forwarding $host.
      # Vite 6's preview server rejects requests whose Host header is a
      # non-IP hostname not in preview.allowedHosts ("Blocked request. This
      # host is not allowed."), which would 403 the UI whenever the container
      # is fronted by a real domain name. localhost is always allowed, and the
      # preview server only serves static assets so the real Host is irrelevant.
      proxy_set_header Host localhost:8899;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
